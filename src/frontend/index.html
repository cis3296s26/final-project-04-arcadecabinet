<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcade Cabinet</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header>
      <h1>Arcade Cabinet</h1>
    </header>

    <section class="grid-container">
      <article class="game-card">
        <button
          type="button"
          class="image-selector"
          onclick="window.location.href = 'config.html?game=minecraft'"
        >
          <img src="./imgs/mc.png" alt="Select Minecraft" />
        </button>
        <h3>Minecraft</h3>
        <p>Status: <em>Available</em></p>
      </article>
      <article class="game-card coming-soon">
        <button
          type="button"
          class="image-selector"
          onclick="window.location.href = 'config.html?game=cs2'"
        >
          <img src="./imgs/cs2.png" alt="Select CS2" />
        </button>
        <h3>CS2</h3>
        <p>Status: <em>Coming Soon</em></p>
      </article>
      <article class="game-card coming-soon">
        <button type="button" class="image-selector" disabled>
          <img src="placeholder.jpg" alt="Valheim - Coming Soon" />
        </button>
        <h3>Valheim</h3>
        <p>Status: <em>Coming Soon</em></p>
      </article>
    </section>
  </body>
</html>
