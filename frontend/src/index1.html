<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcade Cabinet</title>
    <link rel="stylesheet" href="index1.css" />
  </head>
  <body>
    <header class="main-header">
      <h1 class="logo-text">Arcade Cabinet</h1>
    </header>
    <section class="grid-container">
      <article class="game-card">
        <div class="image-wrapper">
          <img src="./imgs/cs2-bg.png" alt="CS2" draggable="false" />
          <div class="overlay-buttons">
            <button
              class="btn create-btn"
              onclick="window.location.href = 'config.html?game=cs2'"
            >
              Create
            </button>
            <button
              class="btn join-btn"
              onclick="window.location.href = 'config.html?game=cs2'"
            >
              Join
            </button>
          </div>
        </div>
        <div class="card-content">
          <h3>CS2</h3>
          <p>Status: <em>Available</em></p>
        </div>
      </article>

      <article class="game-card">
        <div class="image-wrapper">
          <img src="./imgs/mc-bg.png" alt="Minecraft" draggable="false" />
          <div class="overlay-buttons">
            <button
              class="btn create-btn"
              onclick="window.location.href = 'config.html?game=minecraft'"
            >
              Create
            </button>
            <button
              class="btn join-btn"
              onclick="window.location.href = 'join.html?game=minecraft'"
            >
              Join
            </button>
          </div>
        </div>
        <div class="card-content">
          <h3>Minecraft</h3>
          <p>Status: <em>Available</em></p>
        </div>
      </article>

      <article class="game-card coming-soon">
        <div class="image-wrapper">
          <img
            src="./imgs/ark-bg.png"
            alt="Ark: Survival Evolved"
            draggable="false"
          />
        </div>
        <div class="card-content">
          <h3>Ark: Survival Evolved</h3>
          <p>Status: <em>Coming Soon</em></p>
        </div>
      </article>

      <article class="game-card coming-soon">
        <div class="image-wrapper">
          <img src="./imgs/arma3-bg.png" alt="Arma 3" draggable="false" />
        </div>
        <div class="card-content">
          <h3>Arma 3</h3>
          <p>Status: <em>Coming Soon</em></p>
        </div>
      </article>

      <article class="game-card coming-soon">
        <div class="image-wrapper">
          <img
            src="./imgs/kf2-bg.png"
            alt="Killing Floor 2"
            draggable="false"
          />
        </div>
        <div class="card-content">
          <h3>Killing Floor 2</h3>
          <p>Status: <em>Coming Soon</em></p>
        </div>
      </article>

      <article class="game-card coming-soon">
        <div class="image-wrapper">
          <img src="./imgs/rust-bg.png" alt="Rust" draggable="false" />
        </div>
        <div class="card-content">
          <h3>Rust</h3>
          <p>Status: <em>Coming Soon</em></p>
        </div>
      </article>

      <article class="game-card coming-soon">
        <div class="image-wrapper">
          <img src="./imgs/terraria-bg.png" alt="Terraria" draggable="false" />
        </div>
        <div class="card-content">
          <h3>Terraria</h3>
          <p>Status: <em>Coming Soon</em></p>
        </div>
      </article>

      <article class="game-card coming-soon">
        <div class="image-wrapper">
          <img src="./imgs/valheim-bg.png" alt="Valheim" draggable="false" />
        </div>
        <div class="card-content">
          <h3>Valheim</h3>
          <p>Status: <em>Coming Soon</em></p>
        </div>
      </article>
    </section>
  </body>
</html>
